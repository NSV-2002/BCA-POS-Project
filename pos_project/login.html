<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MonkeyZone POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Nunito',sans-serif;
      background:linear-gradient(135deg,#4a0080 0%,#6a0dad 50%,#9b59b6 100%);
      display:flex;justify-content:center;align-items:center;height:100vh;
    }
    .login-wrap{width:100%;max-width:380px;padding:20px;}
    .brand{text-align:center;margin-bottom:28px;color:white;}
    .brand .logo-icon{font-size:48px;display:block;margin-bottom:8px;}
    .brand h1{font-size:26px;font-weight:800;letter-spacing:0.5px;}
    .brand p{font-size:14px;opacity:0.8;margin-top:4px;}
    .card{
      background:white;border-radius:20px;padding:32px;
      box-shadow:0 20px 60px rgba(0,0,0,0.25);
    }
    .card h2{font-size:20px;font-weight:800;color:#2d2d2d;margin-bottom:24px;text-align:center;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:13px;font-weight:700;color:#555;margin-bottom:6px;}
    .field input{
      width:100%;padding:11px 14px;
      border:1.5px solid #e0d6f0;border-radius:10px;
      font-family:'Nunito',sans-serif;font-size:14px;outline:none;
      transition:border 0.2s,box-shadow 0.2s;
    }
    .field input:focus{border-color:#6a0dad;box-shadow:0 0 0 3px rgba(106,13,173,0.1);}
    .btn{
      width:100%;padding:13px;
      background:linear-gradient(135deg,#6a0dad,#9b59b6);
      color:white;border:none;border-radius:10px;
      font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;
      cursor:pointer;transition:all 0.2s;margin-top:6px;
      box-shadow:0 4px 16px rgba(106,13,173,0.3);
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(106,13,173,0.4);}
    .error-msg{
      background:#fff0f0;border:1px solid #f5c6c6;
      color:#c0392b;padding:10px;border-radius:8px;
      font-size:13px;font-weight:600;text-align:center;margin-bottom:14px;display:none;
    }
    .error-msg.show{display:block;}
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <span class="logo-icon">🐒</span>
    <h1>MonkeyZone POS</h1>
    <p>Point of Sale Management System</p>
  </div>

  <div class="card">
    <h2>Sign In</h2>

    <div class="error-msg" id="errorMsg"></div>

    <form action="login.php" method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Login →</button>
    </form>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'invalid') {
    const el = document.getElementById('errorMsg');
    el.textContent = 'Invalid username or password. Please try again.';
    el.classList.add('show');
  } else if (params.get('error') === 'empty') {
    const el = document.getElementById('errorMsg');
    el.textContent = 'Please enter both username and password.';
    el.classList.add('show');
  }
</script>

</body>
</html>
